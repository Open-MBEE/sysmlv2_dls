name: Test sysmlv2_dls

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements-ci.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-ci.txt
        pip install git+https://github.com/Open-MBEE/sysmlv2-python-client.git@main
        pip install git+https://github.com/Open-MBEE/flexo_syside.git@main
        pip install syside==0.8.6
        pip install pytest pytest-cov
        pip install -e .

    - name: Check SysIDE license key presence
      run: |
        if [ -n "$SYSIDE_LICENSE_KEY" ]; then
          echo "SYSIDE_LICENSE_KEY present"
        else
          echo "SYSIDE_LICENSE_KEY missing, tests will use mocks if supported"
        fi
      env:
        SYSIDE_LICENSE_KEY: ${{ secrets.SYSIDE_LICENSE_KEY }}
    - name: Run tests with coverage
      env:
        SYSIDE_LICENSE_KEY: ${{ secrets.SYSIDE_LICENSE_KEY }}
        ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        ONSHAPE_TARGET_ASSEMBLY_URL: ${{ secrets.ONSHAPE_TARGET_ASSEMBLY_URL }}

      run: |
        mkdir -p test-results
        pytest -v --tb=short --junitxml=test-results/results.xml --cov=src --cov-report=xml:test-results/coverage.xml --cov-report=html:test-results/htmlcov

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-sysmlv2-dls
        path: test-results/



